name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-release-${{ runner.os }}

      - name: Install dependencies
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc cpio
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Build static binary
        run: make

      - name: Build cpio initramfs
        run: make cpio

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kamikaze
            kamikaze.cpio
