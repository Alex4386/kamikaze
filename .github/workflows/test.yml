name: Test (QEMU)

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc cpio qemu-system-x86 curl

      - name: Run QEMU test
        run: ./ci/run-qemu.sh

      - name: Upload QEMU log
        uses: actions/upload-artifact@v4
        with:
          name: qemu-log
          path: ci/qemu.log
