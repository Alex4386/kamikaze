name: Test (QEMU)

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-test-${{ runner.os }}

      - name: Install dependencies
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc cpio qemu-system-x86 curl
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Run QEMU test
        run: ./ci/run-qemu.sh

      - name: Upload QEMU log
        uses: actions/upload-artifact@v4
        with:
          name: qemu-log
          path: ci/qemu.log
