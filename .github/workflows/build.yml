name: Build

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc cpio

      - name: Build static binary
        run: make

      - name: Build cpio initramfs
        run: make cpio

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kamikaze
          path: kamikaze

      - name: Upload cpio
        uses: actions/upload-artifact@v4
        with:
          name: kamikaze-cpio
          path: kamikaze.cpio
